[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "out"
cache_path = "cache"
solc = "0.8.28"
evm_version = "paris"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
local = "${RPC_URL_LOCAL}"
neon_devnet = "${RPC_URL_DEVNET}"
neon_mainnet = "${RPC_URL_MAINNET}"
